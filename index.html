<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3keys にがてたいじプリント生成アプリ</title>
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", "Yu Gothic", sans-serif;
      background-color: #f4f7f6;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
    }
    .container {
      background-color: #ffffff;
      padding: 36px 30px;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 520px;
      width: 90%;
    }
    h1 {
      font-size: 1.4rem;
      color: #2c3e50;
      margin-bottom: 8px;
      border-bottom: 3px solid #3498db;
      padding-bottom: 12px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 22px;
    }
    .steps {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .step {
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 16px;
      padding: 4px 12px;
    }
    label {
      display: block;
      text-align: left;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      padding: 12px;
      font-size: 1.05rem;
      border: 2px solid #bdc3c7;
      border-radius: 8px;
      background-color: #fff;
      cursor: pointer;
      outline: none;
      margin-bottom: 18px;
      box-sizing: border-box;
    }
    select:focus { border-color: #3498db; }
    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 13px 30px;
      font-size: 1.05rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #2980b9; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="container">
    <h1>3keys にがてたいじプリント生成アプリ</h1>
    <p class="subtitle">間違えた問題だけを選んで、オリジナルの復習プリントを作ろう！</p>

    <div class="steps">
      <span class="step">① 問題セットを選ぶ</span>
      <span class="step">② 間違えた問題にチェック</span>
      <span class="step">③ プリントを印刷</span>
    </div>

    <label for="problemSetSelect">問題セットを選んでください：</label>
    <select id="problemSetSelect" onchange="updateButton()">
      <option value="">-- 問題セットを選択 --</option>

      <optgroup label="漢字熟語">
        <option value="https://test.bt-c.jp/kanji/simple/index.php?pt=grade1">漢字熟語　１年</option>
        <option value="https://test.bt-c.jp/kanji/simple/index.php?pt=grade2">漢字熟語　２年</option>
        <!-- 3年以降は、実際のURLをそのままコピーして追加してください -->
      </optgroup>
    </select>

    <button id="startBtn" onclick="goToSet()" disabled>この問題セットで始める</button>
  </div>

  <script>
    function updateButton() {
      const sel = document.getElementById('problemSetSelect');
      document.getElementById('startBtn').disabled = !sel.value;
    }

    function goToSet() {
      const sel = document.getElementById('problemSetSelect');
      if (!sel.value) {
        alert('問題セットを選んでください。');
        return;
      }
      // 新しいタブで既存の問題選択ページを開きます
      window.open(sel.value, "_blank");
    }
  </script>

</body>
</html>
